<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo circular verde -->
  <circle cx="50" cy="50" r="50" fill="#C9EE96"/>
  <!-- Flor de lótus em marrom -->
  <g fill="rgba(96,71,71,0.12)" stroke="#604747" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Pétala central (topo) -->
    <ellipse cx="50" cy="42" rx="14" ry="18"/>
    <!-- Pétala esquerda -->
    <ellipse cx="29" cy="52" rx="11" ry="15" transform="rotate(-28 29 52)"/>
    <!-- Pétala direita -->
    <ellipse cx="71" cy="52" rx="11" ry="15" transform="rotate(28 71 52)"/>
    <!-- Pétala inferior -->
    <ellipse cx="50" cy="66" rx="9" ry="11"/>
    <!-- Ponto do caule -->
    <circle cx="50" cy="73" r="3.5" fill="#604747" stroke="none"/>
  </g>
</svg>
